{% set name = "uptrace" %}
{% set version = "1.34.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/uptrace-{{ version }}.tar.gz
  sha256: 5f30f51966c4a92f42b060e785e09dd02fb923846abb6450f25514f20275a1a8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - opentelemetry-api >=1.34.1,<1.32.dev0
    - opentelemetry-sdk >=1.34.1,<1.32.dev0
    - opentelemetry-exporter-otlp >=1.34.1,<1.32.dev0
    - opentelemetry-instrumentation >=0.55b1,<1.dev0

test:
  imports:
    - uptrace
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://uptrace.dev
  summary: OpenTelemetry Python distribution for Uptrace
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - timkpaine
